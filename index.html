<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body{
    font-family: Arial, sans-serif;
    background:#ffffff;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.logo{
    margin-top:30px;
    margin-bottom:20px;
}
.logo img{
    width:120px;
}

/* Signin Box */
.signin-box{
    width:350px;
    border:1px solid #ddd;
    padding:20px 26px;
    border-radius:8px;
}

.signin-box h2{
    font-weight:500;
    margin-bottom:15px;
}

label{
    font-size:14px;
    font-weight:bold;
}

input{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #a6a6a6;
    border-radius:4px;
}

input:focus{
    outline:none;
    border:1px solid #007185;
    box-shadow:0 0 3px #007185;
}

.continue-btn{
    width:100%;
    background:#ffd814;
    border:none;
    padding:10px;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}

.continue-btn:hover{
    background:#f7ca00;
}

.text{
    font-size:12px;
    margin-top:15px;
}

.text a{
    color:#0066c0;
    text-decoration:none;
}

.text a:hover{
    text-decoration:underline;
}

.divider{
    margin:25px 0 10px;
    font-size:13px;
}

.create-btn{
    width:350px;
    background:#e7e9ec;
    border:1px solid #adb1b8;
    padding:10px;
    border-radius:20px;
    cursor:pointer;
    margin-top:10px;
}

.create-btn:hover{
    background:#d5d9d9;
}

/* Footer */
.footer{
    margin-top:40px;
    font-size:12px;
    color:#555;
    text-align:center;
}

.footer a{
    margin:0 10px;
    color:#0066c0;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}
</style>
</head>
<body>
    
<div class="logo">
    <img src="https://pngimg.com/uploads/amazon/amazon_PNG11.png">
</div>

<!-- Sign In Box -->
<div class="signin-box">
    <h2>Sign in or create account</h2>

    <form>
        <label>Enter mobile number or email</label>
        <input type="text" required>

        <button class="continue-btn">Continue</button>
    </form>

    <div class="text">
        By continuing, you agree to Amazon's
        <a href="#">Conditions of Use</a>
        and
        <a href="#">Privacy Notice</a>.
    </div>

    <div class="divider">
        Buying for work?<br>
        <a href="#">Create a free business account</a>
    </div>
</div>

<button class="create-btn">Create your Amazon account</button>

<!-- Footer -->
<div class="footer">
    <a href="#">Conditions of Use</a>
    <a href="#">Privacy Notice</a>
    <a href="#">Help</a>
    <br><br>
    © 1996-2026, Amazon Clone
</div>
    
</body>
</html>
